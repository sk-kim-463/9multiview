    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube Multiview_9</title>

    <style>
        body {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-wrapper {
            width: calc(33.33% - 10px);
            margin: 3px;
            box-sizing: border-box;
            position: relative;
        }

        .text-box {
            position: absolute;
            bottom: 0;
            left: 50%;  /* Center the text box horizontally */
            transform: translateX(-50%);  /* Center the text box horizontally */
            width: 40%;
            padding: 1px;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background-color: rgba(255, 255, 255, 0.9);
            color: black;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .video-wrapper {
                width: calc(50% - 20x`0px);
            }
        }
    </style>

</head>
<body>

<script>
    const apiKey = 'AIzaSyAAlz4Qbvkh5rvr-Ffwdt1RbsaqC4HqCVw';
    
    // 데이터 갱신을 위한 매핑 매개체 정의 (기존 구조 완벽 유지)
    const videoConfig = {
        'VlaCnp1fxI8': { elementId: 'realTimeViewers1', name: '한국경제TV' },
        'lb1oB2feqkQ': { elementId: 'realTimeViewers2', name: 'MTN' },
        'yhpbioCP6nA': { elementId: 'realTimeViewers3', name: '연합뉴스경제' },
        's9xL1DpBsfQ': { elementId: 'realTimeViewers4', name: '매일경제TV' },
        '5cFoz90FUMk': { elementId: 'realTimeViewers5', name: '이데일리TV' },
        'w05Ejc0iOVI': { elementId: 'realTimeViewers6', name: '토마토TV' },
        'aZyD6EPl6KU': { elementId: 'realTimeViewers7', name: 'YTN' },
        '6QZ_qc75ihU': { elementId: 'realTimeViewers8', name: '연합뉴스' },
        'iEpJwprxDdk': { elementId: 'realTimeViewers9', name: 'Bloomberg' }
    };

    const videoIds = Object.keys(videoConfig);

    // 9개의 API 요청을 단 1번의 호출로 병합하는 함수
    function fetchAllRealTimeViewers() {
        const concatenatedIds = videoIds.join(',');
        
        fetch(`https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${concatenatedIds}&key=${apiKey}`)
            .then(response => response.json())
            .then(data => {
                if (!data.items) return;

                // 응답받은 배열을 가볍게 돌며 각 텍스트 박스 매칭 업데이트
                data.items.forEach(item => {
                    const videoId = item.id;
                    const config = videoConfig[videoId];
                    
                    if (config && item.liveStreamingDetails && item.liveStreamingDetails.concurrentViewers) {
                        const realTimeViewers = item.liveStreamingDetails.concurrentViewers;
                        const formattedViewers = addCommasToNumber(realTimeViewers);
                        document.getElementById(config.elementId).innerText = `${config.name}: ${formattedViewers}명`;
                    }
                });
            })
            .catch(error => console.error('Error fetching data:', error));
    }

    function addCommasToNumber(number) {
        return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    // 웹페이지 초기 로드 시 1회 일괄 호출
    fetchAllRealTimeViewers();

    // 30초마다 1회 일괄 호출 인터벌 적용
    setInterval(() => {
        fetchAllRealTimeViewers();
    }, 30000);
</script>
